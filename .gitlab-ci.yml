stages:
  - build
  - deploy      

variables:
  DOCKER_DRIVER: overlay2
  IMAGE_NAME: boiledsteak/fyp-auction-app
  GCP_REGION: asia-southeast1
  CLOUD_RUN_SERVICE: auctioneer-app

#----------------------------------------------------------------
# 1. Build frontend
#----------------------------------------------------------------
build-app:
  stage: build
  image: node:23.11.0-alpine3.21
  script:
    - npm install --prefix frontend
    - npm run build --prefix frontend
  artifacts:
    paths:
      - frontend/dist
    expire_in: 1 hour
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'

#----------------------------------------------------------------
# 2. Docker push BEFORE Terraform
#----------------------------------------------------------------
docker-push:
  stage: deploy
  image: docker:24.0.5
  services:
    - docker:dind
  variables:
    DOCKER_HOST: "tcp://docker:2375"
    DOCKER_TLS_CERTDIR: ""
  script:
    - echo "$DOCKER_PASSWORD" | docker login -u "$DOCKER_USERNAME" --password-stdin
    # 🔑 Use Git commit hash as version tag
    - TAG=$CI_COMMIT_SHORT_SHA

    # 🐳 Build and tag image
    - docker build --no-cache -t $IMAGE_NAME:$TAG .

    # 🛳️ Push the versioned image
    - docker push $IMAGE_NAME:$TAG


#----------------------------------------------------------------
# 3. Terraform now runs AFTER Docker image is pushed
#----------------------------------------------------------------
terraform:
  stage: deploy
  needs:
    - job: docker-push   # 👈 Enforce sequential order
  image:
    name: hashicorp/terraform:latest
    entrypoint: ["/bin/sh","-c"]
  variables:
    TF_TOKEN_app_terraform_io: "${HCP_TF_TKN}"
    IMAGE_TAG: "$CI_COMMIT_SHORT_SHA"  # 👈 pass tag into terraform
  script:
    - terraform init
    - terraform apply -auto-approve -var="image_url=docker.io/$IMAGE_NAME:$IMAGE_TAG"
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'