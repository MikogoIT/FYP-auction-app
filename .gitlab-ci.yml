stages:
  - build
  - deploy

variables:
  DOCKER_DRIVER: overlay2
  IMAGE_NAME: boiledsteak/fyp-auction-app
  GCP_REGION: asia-southeast1
  CLOUD_RUN_SERVICE: auctioneer-app
  GCS_DEV_BUCKET_NAME: auctioneer-static-assets

#----------------------------------------------------------------
# 1. Build frontend
#----------------------------------------------------------------
build-app:
  stage: build
  image: node:23.11.0-alpine3.21
  script:
    - npm install --prefix frontend
    - npm run build --prefix frontend
  artifacts:
    paths:
      - frontend/dist
    expire_in: 1 hour
  rules:
    - changes:
        - backend
        - frontend

#----------------------------------------------------------------
# 2. Docker push BEFORE Terraform
#----------------------------------------------------------------
docker-push:
  stage: deploy
  image: docker:24.0.5
  needs:
    - job: build-app
  services:
    - docker:dind
  variables:
    DOCKER_HOST: "tcp://docker:2375"
    DOCKER_TLS_CERTDIR: ""
  script:
    - echo "$DOCKER_PASSWORD" | docker login -u "$DOCKER_USERNAME" --password-stdin

    # 🏷 Determine tag
    - |
      if [ "$CI_COMMIT_BRANCH" = "main" ]; then
        TAG=$CI_COMMIT_SHORT_SHA
      else
        TAG=$(echo "$CI_COMMIT_BRANCH" | sed 's/[^a-zA-Z0-9_.-]/-/g')
      fi
      echo "Using tag: $TAG"

    - docker build --no-cache -t $IMAGE_NAME:$TAG .
    - docker push $IMAGE_NAME:$TAG
  

#----------------------------------------------------------------
# 3. Upload images folder to GCS
#----------------------------------------------------------------
upload-images-to-gcs:
  stage: deploy
  image: google/cloud-sdk:slim
  #  ask GitLab for an OIDC ID token, audience = your Workload Identity Provider
  id_tokens:
    GITLAB_OIDC_TOKEN:
      aud: "https://gitlab.com"

  before_script:
    - apt-get update && apt-get install -y jq

     #  exchange the OIDC token for a federated GCP access token
    - |
      FED_TOKEN=$(curl -s -X POST https://sts.googleapis.com/v1/token \
        -H "Content-Type: application/json; charset=utf-8" \
        -d '{
          "grantType":"urn:ietf:params:oauth:grant-type:token-exchange",
          "requestedTokenType":"urn:ietf:params:oauth:token-type:access_token",
          "subjectTokenType":"urn:ietf:params:oauth:token-type:jwt",
          "subjectToken":"'"$GITLAB_OIDC_TOKEN"'",
          "scope":"https://www.googleapis.com/auth/cloud-platform",
          "audience":"//iam.googleapis.com/projects/'"$GCP_PROJECT_NUMBER"'/locations/global/workloadIdentityPools/gitlab-pool/providers/gitlab"
        }' | jq -r .access_token)


    #  impersonate your GCP service account
    - |
      ACCESS_TOKEN=$(curl -s -X POST \
        "https://iamcredentials.googleapis.com/v1/projects/-/serviceAccounts/${GCP_SERVICE_ACCOUNT_EMAIL}:generateAccessToken" \
        -H "Content-Type: application/json; charset=utf-8" \
        -H "Authorization: Bearer $FED_TOKEN" \
        -d '{"scope":["https://www.googleapis.com/auth/cloud-platform"]}' \
        | jq -r .accessToken)

    #  configure gcloud to use that token
    # -- 1) Export the token so gcloud uses it automatically
    - export CLOUDSDK_AUTH_ACCESS_TOKEN="$ACCESS_TOKEN"

    # -- 2) Configure your project & region
    - gcloud config set project "$GCP_PROJECT_ID"
    - gcloud config set run/region "$GCP_REGION"
    - gcloud config set run/platform managed


  script:
    - echo "Uploading images/ folder to GCS"
    - gsutil -m cp -r images/* gs://$GCS_DEV_BUCKET_NAME/
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'

#----------------------------------------------------------------
# 4. Terraform
#----------------------------------------------------------------
terraform:
  stage: deploy
  needs:
    - job: docker-push
    - job: upload-images-to-gcs
  image:
    name: hashicorp/terraform:latest
    entrypoint: ["/bin/sh","-c"]
  variables:
    TF_TOKEN_app_terraform_io: "${HCP_TF_TKN}"
    IMAGE_TAG: "$CI_COMMIT_SHORT_SHA"
  script:
    - terraform init
    - terraform apply -auto-approve -var="image_url=docker.io/$IMAGE_NAME:$IMAGE_TAG"
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
