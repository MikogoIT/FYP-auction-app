stages:
  # - security test
  # - build
  # - deploy 1     # Docker → GAR
  - deploy 2     # Terraform
  # - deploy 3     # GCS upload

variables:
  # Docker-in-Docker driver
  DOCKER_DRIVER: overlay2

  # GCP settings
  GCP_REGION: asia-southeast1
  GCP_PROJECT_ID: "$GCP_PROJECT_ID"
  GCP_PROJECT_NUMBER: "$GCP_PROJECT_NUMBER"
  GCP_SERVICE_ACCOUNT_EMAIL: "$GCP_SERVICE_ACCOUNT_EMAIL"

  # GAR settings
  GAR_REGISTRY: "$GCP_REGION-docker.pkg.dev"
  GAR_REPO_BASE: "fyp-auction-app"

  # Cloud Run
  CLOUD_RUN_SERVICE: auctioneer-app

  # Static assets
  GCS_DEV_BUCKET_NAME: auctioneer-static-assets

  # telegram bot code
  GCS_TELE_BUCKET_NAME: auctioneer-tele-bot

  # notifications bot code
  GCS_NOTIF_BUCKET_NAME: auctioneer-notif-bot

