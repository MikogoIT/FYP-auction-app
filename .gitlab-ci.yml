#----------------------------------------------------------------
# 1. Build frontend (always runs)
#----------------------------------------------------------------
build-app:
  stage: build
  image: node:23.11.0-alpine3.21

  before_script:
    # ensure the cache path exists
    - mkdir -p frontend/node_modules

  cache:
    key: cache-frontend-${CI_COMMIT_REF_SLUG}
    paths:
      - frontend/node_modules/

  script:
    - npm install --prefix frontend
    - npm run build --prefix frontend

  artifacts:
    paths:
      - frontend/dist
    expire_in: 1 hour


#----------------------------------------------------------------
# 2. Build & Push to GAR (all branches → same repo)
#----------------------------------------------------------------
docker-push:
  stage: deploy 1
  image: google/cloud-sdk:slim
  services:
    - docker:dind
  id_tokens:
    GITLAB_OIDC_TOKEN:
      aud: "https://gitlab.com"
  variables:
    DOCKER_HOST: "tcp://docker:2375"
    DOCKER_TLS_CERTDIR: ""
  before_script:
    - apt-get update && apt-get install -y jq
    # Exchange OIDC → short-lived GCP token
    - |
      FED_TOKEN=$(curl -s -X POST https://sts.googleapis.com/v1/token \
        -H "Content-Type: application/json; charset=utf-8" \
        -d '{
          "grantType":"urn:ietf:params:oauth:grant-type:token-exchange",
          "requestedTokenType":"urn:ietf:params:oauth:token-type:access_token",
          "subjectTokenType":"urn:ietf:params:oauth:token-type:jwt",
          "subjectToken":"'"$GITLAB_OIDC_TOKEN"'",
          "scope":"https://www.googleapis.com/auth/cloud-platform",
          "audience":"//iam.googleapis.com/projects/'"$GCP_PROJECT_NUMBER"'/locations/global/workloadIdentityPools/gitlab-pool/providers/gitlab"
        }' | jq -r .access_token)
    - |
      ACCESS_TOKEN=$(curl -s -X POST \
        "https://iamcredentials.googleapis.com/v1/projects/-/serviceAccounts/${GCP_SERVICE_ACCOUNT_EMAIL}:generateAccessToken" \
        -H "Content-Type: application/json; charset=utf-8" \
        -H "Authorization: Bearer $FED_TOKEN" \
        -d '{"scope":["https://www.googleapis.com/auth/cloud-platform"]}' \
        | jq -r .accessToken)
    - export CLOUDSDK_AUTH_ACCESS_TOKEN="$ACCESS_TOKEN"
    - gcloud auth configure-docker "$GAR_REGISTRY" --quiet

  script:
    - |
      # single GAR repo exists (provisioned via main/Terraform)
      REPO="$GAR_REPO_BASE"
      if [ "$CI_COMMIT_BRANCH" = "main" ]; then
        TAG="$CI_COMMIT_SHORT_SHA"
      else
        TAG=$(echo "$CI_COMMIT_BRANCH" | sed 's/[^a-zA-Z0-9_.-]/-/g')
      fi
      IMAGE_PATH="$GAR_REGISTRY/$GCP_PROJECT_ID/$REPO/auctioneer-app"
    - docker build -t "${IMAGE_PATH}:${TAG}" .
    - docker push "${IMAGE_PATH}:${TAG}"

#----------------------------------------------------------------
# 3. Terraform apply (only on main)
#----------------------------------------------------------------
terraform:
  stage: deploy 2
  image:
    name: hashicorp/terraform:latest
    entrypoint: ["/bin/sh","-c"]
  variables:
    TF_TOKEN_app_terraform_io: "${HCP_TF_TKN}"
    TF_VAR_image_url: "${GAR_REGISTRY}/${GCP_PROJECT_ID}/${GAR_REPO_BASE}/auctioneer-app:${CI_COMMIT_SHORT_SHA}"
  script:
    - terraform init
    - terraform state rm 'google_artifact_registry_repository.fyp_docker_repo.cleanup_policies[1]'

    - terraform apply -auto-approve
  
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: on_success
    - when: never


#----------------------------------------------------------------
# 4. Upload images folder to GCS
#----------------------------------------------------------------
upload-images-to-gcs:
  stage: deploy 3
  image: google/cloud-sdk:slim
  id_tokens:
    GITLAB_OIDC_TOKEN:
      aud: "https://gitlab.com"
  before_script:
    - apt-get update && apt-get install -y jq
    - |
      FED_TOKEN=$(curl -s -X POST https://sts.googleapis.com/v1/token \
        -H "Content-Type: application/json; charset=utf-8" \
        -d '{
          "grantType":"urn:ietf:params:oauth:grant-type:token-exchange",
          "requestedTokenType":"urn:ietf:params:oauth:token-type:access_token",
          "subjectTokenType":"urn:ietf:params:oauth:token-type:jwt",
          "subjectToken":"'"$GITLAB_OIDC_TOKEN"'",
          "scope":"https://www.googleapis.com/auth/cloud-platform",
          "audience":"//iam.googleapis.com/projects/'"$GCP_PROJECT_NUMBER"'/locations/global/workloadIdentityPools/gitlab-pool/providers/gitlab"
        }' | jq -r .access_token)
    - |
      ACCESS_TOKEN=$(curl -s -X POST \
        "https://iamcredentials.googleapis.com/v1/projects/-/serviceAccounts/${GCP_SERVICE_ACCOUNT_EMAIL}:generateAccessToken" \
        -H "Content-Type: application/json; charset=utf-8" \
        -H "Authorization: Bearer $FED_TOKEN" \
        -d '{"scope":["https://www.googleapis.com/auth/cloud-platform"]}' \
        | jq -r .accessToken)
    - export CLOUDSDK_AUTH_ACCESS_TOKEN="$ACCESS_TOKEN"
    - gcloud config set project "$GCP_PROJECT_ID"
    - gcloud config set run/region "$GCP_REGION"
    - gcloud config set run/platform managed

  script:
    - echo "Uploading images/ folder to GCS"
    - gcloud storage cp --recursive images/* gs://$GCS_DEV_BUCKET_NAME
    - echo "Removing files from images folder"
    - find images/ -type f -delete

  rules:
  - if: '$CI_COMMIT_BRANCH == "main"'
    changes:
      - images/**
    when: on_success
  # otherwise, never run
  - when: never

